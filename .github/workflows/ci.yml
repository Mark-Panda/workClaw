name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Backend ──────────────────────────────────────────────
  backend:
    name: Rust ${{ matrix.rust }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    name: Node-${{ matrix.node }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc -b

      - name: Lint
        run: pnpm lint || true

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── E2E ──────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build backend
        run: cargo build --workspace

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install Playwright
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Start services
        run: |
          cargo run --bin herness-server &
          sleep 3
          curl -f http://localhost:3000/api/health

      - name: Run E2E tests
        working-directory: frontend
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/2

  # ── Docker ───────────────────────────────────────────────
  docker:
    name: Docker build
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t workclaw-backend .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t workclaw-frontend .
